pull_request_rules:
  # Automatically queue bot PRs when they are ready
  - name: merge [bot] PRs when CI pass
    conditions:
      - or:
          - author = dependabot[bot]
          - author = gepetto-flake-updater[bot]
          - author = mc-rtc-nixpkgs-flake-updater[bot]
          - author = github-actions[bot]
          - author = pre-commit-ci[bot]
    actions:
      queue:

  # Queue PRs when a human adds the "queued" label
  # Or upon '@mergifyio queue' comment
  - name: queue PRs with "queued" label
    conditions:
      - label = queued
    actions:
      queue:

queue_rules:
  - name: default
    queue_conditions:
      - check-success = "check-macos-linux-nix"
      - check-success = "check-build"
      - check-success = "check-package"
      - check-success = "pre-commit.ci - pr"
