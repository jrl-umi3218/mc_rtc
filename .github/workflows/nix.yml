name: "CI - Nix"
on:
  push:
    branches:
      - devel
      - master
      - main
    paths-ignore:
    - README.md
    - CHANGELOG.md
    - ".github/workflows/build.yml"
    - ".github/workflows/package.yml"
    - ".pre-commit-config.yaml"
    - "robots/README.md"
    - "utils/**/README.md"
    - "observers/**/README.md"
    - "controllers/**/README.md"
    - "binding/**/README.md"
    - "src/mc_rtc/README.md"
  pull_request:
    branches:
      - devel
      - master
      - main
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  nix:
    runs-on: "${{ matrix.os }}"
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        ccache: [true, false]
    steps:
      - uses: actions/checkout@v7
      - uses: cachix/install-nix-action@v31
      - uses: cachix/cachix-action@v17
        with:
          name: mc-rtc-nix
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'
          extraPullNames: "ros,gepetto"
      - name: "Determine Variant Arguments"
        id: flags
        run: |
          ARGS=""
          # Handle ccache trigger
          if [ "${{ matrix.ccache }}" = "true" ]; then
            ARGS="$ARGS --override-input ccache-trigger github:boolean-option/true"
          else
            ARGS="$ARGS --override-input ccache-trigger github:boolean-option/false"
          fi
          # Trim leading space and export
          echo "args=$(echo "$ARGS" | xargs)" >> "$GITHUB_OUTPUT"
      - if: ${{ matrix.ccache == true }}
        name: Setup ccache environment
        run: |
          sudo mkdir -m0770 -p '/var/cache/ccache'
          if [[ "$RUNNER_OS" == "macOS" ]]; then
            owner_group=$(stat -f "%Su:%Sg" /nix/store)
          else
            owner_group=$(stat -c "%U:%G" /nix/store)
          fi
          sudo chown "$owner_group" /var/cache/ccache
          mkdir -p ~/.config/nix
          echo 'extra-sandbox-paths = /var/cache/ccache' | sudo tee -a /etc/nix/nix.conf
          if command -v systemctl &> /dev/null; then
            sudo systemctl restart nix-daemon.service
          fi
          sudo ls -ld /var/cache/ccache
      - run: nix flake check -L ${{ steps.flags.outputs.args }}
      - run: nix build -L ${{ steps.flags.outputs.args }}
  check:
    if: always()
    name: check-macos-linux-nix
    runs-on: ubuntu-latest
    needs:
      - nix
    steps:
      - uses: re-actors/alls-green@release/v1
        with:
          jobs: ${{ toJSON(needs) }}
