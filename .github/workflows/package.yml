---
name: Package mc_rtc
on:
  repository_dispatch:
    types:
      - package-master
      - package-release
  pull_request:
    branches:
      - "**"
  push:
    paths-ignore:
    - ".gitlab-ci.yml"
    - ".jrl-ci"
    - doc/**
    - README.md
    - "CHANGELOG.md"
    - ".github/workflows/build.yml"
    - ".pre-commit-config.yaml"
    - "robots/README.md"
    - "utils/**/README.md"
    - "observers/**/README.md"
    - "controllers/**/README.md"
    - "binding/**/README.md"
    - "src/mc_rtc/README.md"
    branches:
      - "**"
    tags:
      - v*

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - name: Free Disk Space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Build package
        uses: jrl-umi3218/github-actions/.github/workflows/package-project.yml@master
        with:
          deps: '["jrl-umi3218/mc_rtc_ros", "jrl-umi3218/mc_openrtm", "jrl-umi3218/mc_udp", "jrl-umi3218/mc_panda", "jrl-umi3218/mc_state_observation"]'
          with-ros: true
          latest-cmake: true
          matrix: |
            {
              "dist": ["jammy", "noble", "resolute"],
              "arch": ["amd64"]
            }
        secrets:
          CLOUDSMITH_API_KEY: ${{ secrets.CLOUDSMITH_API_KEY }}
          GH_TOKEN: ${{ secrets.GH_PAGES_TOKEN }}
  check:
    if: always()
    name: check-package
    runs-on: ubuntu-latest
    needs:
      - package
    steps:
      - uses: re-actors/alls-green@release/v1
        with:
          jobs: ${{ toJSON(needs) }}
