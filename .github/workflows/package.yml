---
name: Package mc_rtc
on:
  repository_dispatch:
    types:
    - package-master
    - package-release
  pull_request:
    branches:
    - "**"
  push:
    paths-ignore:
    - ".gitlab-ci.yml"
    - ".jrl-ci"
    - doc/**
    - README.md
    - "CHANGELOG.md"
    - ".github/workflows/build.yml"
    - ".pre-commit-config.yaml"
    - "robots/README.md"
    - "utils/**/README.md"
    - "observers/**/README.md"
    - "controllers/**/README.md"
    - "binding/**/README.md"
    - "src/mc_rtc/README.md"
    branches:
    - "**"
    tags:
    - v*
permissions:
  contents: read
jobs:
  check-tag:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive
      if: startsWith(github.ref, 'refs/tags/')
    - name: Check version coherency
      shell: bash
      run: |
        set -x
        export VERSION=`echo ${{ github.ref }} | sed -e 's@refs/tags/v@@'`
        if [ -f package.xml ]
        then
          echo "REJECTION=version in package.xml does not match tag" >> $GITHUB_ENV
          grep -q "<version>${VERSION}</version>" package.xml
        elif [ -f CMakeLists.txt ]
        then
          echo "REJECTION=PROJECT_VERSION in CMakeLists.txt does not match tag" >> $GITHUB_ENV
          grep -q "set(PROJECT_VERSION ${VERSION})" CMakeLists.txt || grep -q "project(.* VERSION ${VERSION}.*" CMakeLists.txt
        else
          echo "This package does not contain a package.xml nor a CMakeLists.txt, skipping check"
        fi
        if [ -f debian/changelog ]
        then
          PKG_NAME=`grep "^Source:" debian/control|sed -e 's/Source: //'`
          echo "REJECTION=Upstream version in debian/changelog does not match tag" >> $GITHUB_ENV
          head -n 1 debian/changelog | grep -q "${PKG_NAME} (${VERSION}"
        fi
        echo "REJECTION=" >> $GITHUB_ENV
        export TAG=`echo ${{ github.ref }} | sed -e 's@refs/tags/@@'`
        echo "RELEASE_TAG=${TAG}" >> $GITHUB_ENV
      if: startsWith(github.ref, 'refs/tags/')
    - name: Delete tag
      run: |
        set -x
        curl --header "authorization: token ${{ secrets.GITHUB_TOKEN }}" -X DELETE https://api.github.com/repos/${{ github.repository }}/git/${{ github.ref }}
      if: failure()
    - name: Create release
      uses: jrl-umi3218/github-actions/create-release@master
      with:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        tag: ${{ env.RELEASE_TAG }}
      if: startsWith(github.ref, 'refs/tags/')
  build-packages:
    needs: check-tag
    strategy:
      fail-fast: false
      matrix:
        include:
        - dist: jammy
          arch: amd64
          variant: no-ros
          ros_distro: ""
        - dist: noble
          arch: amd64
          variant: no-ros
          ros_distro: ""
        - dist: resolute
          arch: amd64
          variant: no-ros
          ros_distro: ""
        - dist: jammy
          arch: amd64
          variant: ros
          ros_distro: humble
        - dist: noble
          arch: amd64
          variant: ros
          ros_distro: jazzy
    runs-on: ubuntu-22.04
    outputs:
      mirror: ${{ steps.setup-parameters.outputs.mirror }}
      package-job: ${{ steps.setup-parameters.outputs.package-job }}
      do-upload: ${{ steps.setup-parameters.outputs.do-upload }}
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive
    - uses: ssrobins/install-cmake@v1
    - name: Setup packaging parameters
      id: setup-parameters
      shell: bash
      run: |
        set -x
        export PACKAGE_UPLOAD=true
        if ${{ startsWith(github.ref, 'refs/tags/') }}
        then
          export USE_HEAD=false
        elif [ "${{ github.event.action }}" == "package-master" ]
        then
          export USE_HEAD=true
        elif [ "${{ github.event.action }}" == "package-release" ]
        then
          export USE_HEAD=false
          git fetch --tags
          export REF=`git tag --sort=committerdate --list 'v[0-9]*'|tail -1`
          git checkout $REF
          git submodule sync && git submodule update
        else
          export REF=`echo ${{ github.ref }} | sed -e 's@refs/[a-z]*/@@'`
          export USE_HEAD=true
          if [ $REF != "master" ]
          then
            export PACKAGE_UPLOAD=false
          fi
        fi
        if $USE_HEAD
        then
          echo "mirror=mc-rtc/head" >> $GITHUB_OUTPUT
          echo "package-job=package-master" >> $GITHUB_OUTPUT
        else
          echo "mirror=mc-rtc/stable" >> $GITHUB_OUTPUT
          echo "package-job=package-release" >> $GITHUB_OUTPUT
        fi
        echo "do-upload=${PACKAGE_UPLOAD}" >> $GITHUB_OUTPUT
    - name: Handle Python 2
      shell: bash
      run: |
        set -x
        sed -i -e"s/-DPYTHON_DEB_ROOT=\$(TMP)/-DPYTHON_DEB_ROOT=\$(TMP) -DPYTHON_BINDING_BUILD_PYTHON2_AND_PYTHON3:BOOL=OFF -DPYTHON_BINDING_FORCE_PYTHON3:BOOL=ON/" debian/rules
    - name: Setup package variant
      id: setup-variant
      shell: bash
      run: |
        set -x
        if [ "${{ matrix.variant }}" != "ros" ]
        then
          echo "ros-distro=" >> $GITHUB_OUTPUT
          exit 0
        fi
        export ROS_DISTRO="${{ matrix.ros_distro }}"
        if [ -z "${ROS_DISTRO}" ]
        then
          echo "ROS_DISTRO must be set for ROS package variants" >&2
          exit 1
        fi
        echo "ros-distro=${ROS_DISTRO}" >> $GITHUB_OUTPUT
        if [ -f debian/control.ros ]
        then
          sed -e"s/@ROS_DISTRO@/${ROS_DISTRO}/" debian/control.ros | tee -a debian/control
        fi
        sed -i -e"s/# ros-@ROS_DISTRO@/ ros-${ROS_DISTRO}/" debian/control
        sed -i -e"s/@ROS_DISTRO@/${ROS_DISTRO}/" debian/control
        sed -i -e"s/#ROS2 / /" debian/control
        sed -i -e"s/@ROS_DISTRO@/${ROS_DISTRO}/" debian/rules
        sed -i -e"s/#ROS2//" debian/rules
        sed -i -e"s/^Package: libmc-rtc-dev$/Package: ros-${ROS_DISTRO}-libmc-rtc-dev/" debian/control
        sed -i -e"s/^Package: libmc-rtc$/Package: ros-${ROS_DISTRO}-libmc-rtc/" debian/control
        sed -i -e "s/ libmc-rtc (= \${binary:Version}),/ ros-${ROS_DISTRO}-libmc-rtc (= \${binary:Version}),/g" debian/control
        sed -i -e "/^Package: ros-${ROS_DISTRO}-libmc-rtc-dev$/a Conflicts: libmc-rtc-dev" debian/control
        sed -i -e "/^Package: ros-${ROS_DISTRO}-libmc-rtc-dev$/a Replaces: libmc-rtc-dev" debian/control
        sed -i -e "/^Package: ros-${ROS_DISTRO}-libmc-rtc-dev$/a Provides: libmc-rtc-dev" debian/control
        sed -i -e "/^Package: ros-${ROS_DISTRO}-libmc-rtc$/a Conflicts: libmc-rtc" debian/control
        sed -i -e "/^Package: ros-${ROS_DISTRO}-libmc-rtc$/a Provides: libmc-rtc" debian/control
        sed -i -e "s/^Replaces: libmc-rtc1$/Replaces: libmc-rtc, libmc-rtc1/" debian/control
        cp debian/libmc-rtc.install debian/ros-${ROS_DISTRO}-libmc-rtc.install
        cp debian/libmc-rtc-dev.install debian/ros-${ROS_DISTRO}-libmc-rtc-dev.install
        cat debian/control
    - name: Build package
      uses: jrl-umi3218/github-actions/build-package-native@master
      with:
        dist: ${{ matrix.dist }}
        arch: ${{ matrix.arch }}
        cloudsmith-repo: ${{ steps.setup-parameters.outputs.mirror }}
        ros-distro: ${{ steps.setup-variant.outputs.ros-distro }}
        latest-cmake: true
    - uses: actions/upload-artifact@v4
      with:
        name: packages-${{ matrix.dist }}-${{ matrix.arch }}-${{ matrix.variant }}
        path: /tmp/packages-${{ matrix.dist }}-${{ matrix.arch }}/
  upload-packages:
    needs: build-packages
    if: ${{ needs.build-packages.outputs.do-upload == 'true' }}
    strategy:
      max-parallel: 1
      fail-fast: false
      matrix:
        include:
        - dist: jammy
          arch: amd64
          variant: no-ros
        - dist: noble
          arch: amd64
          variant: no-ros
        - dist: resolute
          arch: amd64
          variant: no-ros
        - dist: jammy
          arch: amd64
          variant: ros
        - dist: noble
          arch: amd64
          variant: ros
    runs-on: ubuntu-22.04
    steps:
    - name: Download packages
      uses: actions/download-artifact@v4
      with:
        name: packages-${{ matrix.dist }}-${{ matrix.arch }}-${{ matrix.variant }}
        path: packages-${{ matrix.dist }}-${{ matrix.arch }}-${{ matrix.variant }}
        merge-multiple: true
    - name: Upload
      uses: jrl-umi3218/github-actions/upload-package@master
      with:
        dist: ubuntu/${{ matrix.dist }}
        repo: ${{ needs.build-packages.outputs.mirror }}
        path: packages-${{ matrix.dist }}-${{ matrix.arch }}-${{ matrix.variant }}
        CLOUDSMITH_API_KEY: ${{ secrets.CLOUDSMITH_API_KEY }}
  mirror-sync-and-trigger:
    needs: [build-packages, upload-packages]
    if: ${{ needs.build-packages.outputs.do-upload == 'true' }}
    strategy:
      fail-fast: false
      matrix:
        dep:
        - jrl-umi3218/mc_rtc_ros
        - jrl-umi3218/mc_openrtm
        - jrl-umi3218/mc_udp
        - jrl-umi3218/mc_panda
        - jrl-umi3218/mc_state_observation
    runs-on: ubuntu-22.04
    steps:
    - name: Trigger rebuild
      shell: bash
      run: |
        curl \
          -H "Accept: application/vnd.github.everest-preview+json" \
          -H "Authorization: token ${{ secrets.GH_PAGES_TOKEN }}"  \
          --request POST \
          --data "{\"event_type\": \"${{ needs.build-packages.outputs.package-job }}\"}" \
          https://api.github.com/repos/${{ matrix.dep }}/dispatches
  check:
    if: always()
    name: check-package
    runs-on: ubuntu-latest
    needs:
      - check-tag
      - build-packages
      - upload-packages
      - mirror-sync-and-trigger
    steps:
      - uses: re-actors/alls-green@release/v1
        with:
          jobs: ${{ toJSON(needs) }}
